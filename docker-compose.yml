version: '3.8'
services:
  nginx:
    image: nginx:1.29
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./nginx-upstream.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      websocket-rce:
        condition: service_healthy

  websocket-rce:
    build: ./ws-lab
    ports:
      - "1337:1337"
    healthcheck:
      test: ["CMD", "curl", "-f", "--max-time", "5", "http://localhost:1337/"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  doge-us-east:
    image: doge-unblocker:latest
    ports: ["3000:3000", "8080:8080"]
    environment:
      - REGION=us-east
      - TOR_BRIDGES=us-bridges.txt
    volumes: ['./proxies-us:/app/proxies']

  doge-eu-west:
    image: doge-unblocker:latest  
    ports: ["3001:3000", "8081:8080"]
    environment:
      - REGION=eu-west
    volumes: ['./proxies-eu:/app/proxies']

  doge-ap-southeast:
    image: doge-unblocker:latest
    ports: ["3002:3000", "8082:8080"]
    environment:
      - REGION=ap-southeast
    volumes: ['./proxies-ap:/app/proxies']