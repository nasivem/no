version: '3.8'
services:
  doge-us-east:
    image: doge-unblocker:latest
    ports: ["3000:3000", "8080:8080"]
    environment:
      - REGION=us-east
      - TOR_BRIDGES=us-bridges.txt
    volumes: ['./proxies-us:/app/proxies']

  doge-eu-west:
    image: doge-unblocker:latest  
    ports: ["3001:3000", "8081:8080"]
    environment:
      - REGION=eu-west
    volumes: ['./proxies-eu:/app/proxies']

  doge-ap-southeast:
    image: doge-unblocker:latest
    ports: ["3002:3000", "8082:8080"]
    environment:
      - REGION=ap-southeast
    volumes: ['./proxies-ap:/app/proxies']

  load-balancer:
    image: nginx:alpine
    ports: ["80:80", "443:443"]
    volumes: ['./nginx-upstream.conf:/etc/nginx/conf.d/default.conf']