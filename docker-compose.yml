version: '3.8'
services:
  nginx:
    image: nginx:1.29
    ports:
      - "127.0.0.1:80:80"  # 🛡️ SCHOOL-SAFE: Localhost only (no external access)
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./nginx-upstream.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      websocket-rce:
        condition: service_healthy

  websocket-rce:
    build: ./ws-lab
    ports:
      - "127.0.0.1:1337:1337"  # 🛡️ SCHOOL-SAFE: Localhost only (no external access)
    healthcheck:
      test: ["CMD", "curl", "-f", "--max-time", "5", "http://localhost:1337/"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  doge-us-east:
    image: doge-unblocker:latest
    ports:
      - "127.0.0.1:3000:3000"  # 🛡️ SCHOOL-SAFE: Localhost only
      - "127.0.0.1:8080:8080"  # 🛡️ SCHOOL-SAFE: Localhost only
    environment:
      - REGION=us-east
      - TOR_BRIDGES=us-bridges.txt
    volumes: ['./proxies-us:/app/proxies']

  doge-eu-west:
    image: doge-unblocker:latest
    ports:
      - "127.0.0.1:3001:3000"  # 🛡️ SCHOOL-SAFE: Localhost only
      - "127.0.0.1:8081:8080"  # 🛡️ SCHOOL-SAFE: Localhost only
    environment:
      - REGION=eu-west
    volumes: ['./proxies-eu:/app/proxies']

  doge-ap-southeast:
    image: doge-unblocker:latest
    ports:
      - "127.0.0.1:3002:3000"  # 🛡️ SCHOOL-SAFE: Localhost only
      - "127.0.0.1:8082:8080"  # 🛡️ SCHOOL-SAFE: Localhost only
    environment:
      - REGION=ap-southeast
    volumes: ['./proxies-ap:/app/proxies']