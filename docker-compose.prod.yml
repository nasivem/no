version: '3.8'

services:
  traefik:
    image: traefik:v2.5
    command:
      - --api.insecure=true  # enable the web UI
      - --providers.docker=true
      - --entrypoints.web.address=:80
    ports:
      - "80:80"
      - "8080:8080"  # Traefik UI
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  app:
    image: your-app-image:latest
    deploy:
      replicas: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`your-domain.com`)"
      - "traefik.http.services.app.loadbalancer.server.port=80"

  redis:
    image: redis:alpine

  proxy-tester:
    image: your-proxy-tester-image:latest
    depends_on:
      - app
      - redis
    command: npm run test
